name: Ada (GNAT)

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
          submodules: true

    - name: Set up alire
      uses: alire-project/setup-alire@v5

    - name: Build crate
      run: |
        set -xeuo pipefail
        sudo apt-get update
        sudo apt-get install -y libbox2d-dev
        alr --non-interactive build
        if pushd 'examples'; then
          alr --non-interactive build
        fi
